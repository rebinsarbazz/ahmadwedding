<!DOCTYPE html> 
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&family=Amiri&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Kurdishfont';
            src: url('myfont.woff') format('truetype');
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* FIRST VIEW */
        .first-view {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif;
        }

        /* ✅ Quran font applied */
        h3 {
            font-family: 'Amiri', serif;
            direction: rtl;
            font-size: 22px;
        }

        p {
            font-family: 'Kurdishfont', sans-serif;
        }

        .shape {
            position: absolute;
            transition: all 1.5s ease;
            width: 100%;
        }

        .left-shape { top: 5%; left: -60%; width: 115%; }
        .right-shape { top: 4%; right: -60%; width: 115%; }
        .top-shape { left: -65%; width: 230%; }
        .bottom-shape { bottom: 0%; left: -50%; width: 200%; }

        .center-btn {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            cursor: pointer;
        }

        .center-btn img { width: 120px; }

        /* OPEN ANIMATION */
        .open .left-shape { transform: translateX(-100%); opacity: 0; }
        .open .right-shape { transform: translateX(100%); opacity: 0; }
        .open .top-shape { transform: translateY(-100%); opacity: 0; }
        .open .bottom-shape { transform: translateY(100%); opacity: 0; }
        .open .center-btn { opacity: 0; }

        /* CONTENT */
        .content {
            opacity: 0;
            transition: 2s;
        }

        .open .content { opacity: 1; }

        /* HERO */
        .page {
            background: url("2.jpg") center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #b89b5e;
        }

        /* COUNTDOWN */
        .countdown-section {
            background: #66021f;
            padding: 80px 0;
        }

        .countdown-inner {
            background: #f5f2ee;
            padding: 60px 20px;
            text-align: center;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-family: 'Playfair Display';
            font-size: 2rem;
        }

        /* LOCATION */
        .location-card {
            max-width: 900px;
            margin: 40px auto;
            position: relative;
        }

        .bg-image { width: 100%; }

        .overlay-text {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .divider {
            width: 180px;
            height: 2px;
            margin: 15px auto;
            background: linear-gradient(to right, transparent, #b89b5e, transparent);
        }

        @media(max-width:600px) {
            #countdown {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- ✅ AUDIO -->
    <audio id="bg-music" src="music.mp3" preload="auto" loop></audio>

    <div class="first-view">
        <img class="shape left-shape" src="https://static.tildacdn.net/tild6338-3733-4431-a363-306634383864/Polygon_4.png">
        <img class="shape right-shape" src="https://static.tildacdn.net/tild3636-6566-4132-b665-343766326335/Polygon_3.png">
        <img class="shape top-shape" src="https://static.tildacdn.net/tild3762-3738-4361-b134-333538333135/Polygon_1_3.png">
        <img class="shape bottom-shape" src="https://static.tildacdn.net/tild6262-6339-4933-b833-343039643037/Polygon_2_1.png">

        <div class="center-btn" onclick="openInvite()">
            <h3>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</h3>
            <img src="https://static.tildacdn.net/tild3435-3731-4464-a537-636664626563/ChatGPT_Image_Aug_3_.png">
            <div class="divider"></div>
            <p style="color: rgb(82, 82, 82); position: absolute;">
                بانگهێشتنامەی هاوسەرگیری
            </p>
        </div>
    </div>

    <div class="content">

        <div class="page">
            <h1>Ahmed & Selar</h1>
            <p>بەخۆشحاڵیەوە بانگهێشتتان دەکەین بۆ ئاهەنگی هاوسەرگیریەکەمان</p>
        </div>

        <div class="countdown-section">
            <div class="countdown-inner">
                <p>The Celebration Begins In</p>

                <div id="countdown">
                    <div><span id="days">0</span><br>Days</div>
                    <div><span id="hours">0</span><br>Hours</div>
                    <div><span id="minutes">0</span><br>Minutes</div>
                    <div><span id="seconds">0</span><br>Seconds</div>
                </div>
            </div>
        </div>

        <div class="location-card">
            <img src="1.webp" class="bg-image">
            <div class="overlay-text">
                <h2>Chateau de Paon</h2>
                <p>France</p>
            </div>
        </div>

    </div>

    <script>
        function openInvite() {
            document.body.classList.add("open");

            const music = document.getElementById("bg-music");
            music.volume = 0;
            music.play();

            let vol = 0;
            const fade = setInterval(() => {
                if (vol < 1) {
                    vol += 0.05;
                    music.volume = vol;
                } else {
                    clearInterval(fade);
                }
            }, 200);
        }

        const weddingDate = new Date("June 15, 2026 19:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
