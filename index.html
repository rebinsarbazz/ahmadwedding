<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Wedding Invitation</title>

    <style>
        @font-face {
            font-family: 'Kurdishfont';
            src: url('myfont.woff') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Kurdish';
            src: url('NizarAldhabi.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* ================= FIRST VIEW ================= */
        .first-view {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif;
        }

        p {
            font-family: 'kurdishfont', sans-serif;
        }

        h3 {
            font-family: 'Amiri', serif;
            font-size: 22px;
            direction: rtl;
        }

        .shape {
            position: absolute;
            transition: all 1.5s ease;
            width: 100%;
        }

        .left-shape {
            top: 5%;
            left: -60%;
            width: 115%;
        }

        .right-shape {
            top: 4%;
            right: -60%;
            width: 115%;
        }

        .top-shape {
            left: -65%;
            width: 230%;
        }

        .bottom-shape {
            bottom: 0%;
            left: -50%;
            width: 200%;
        }

        .center-btn {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            cursor: pointer;
        }

        .center-btn img {
            width: 120px;
        }

        /* OPEN ANIMATION */
        .open .left-shape {
            transform: translateX(-100%);
            opacity: 0;
        }

        .open .right-shape {
            transform: translateX(100%);
            opacity: 0;
        }

        .open .top-shape {
            transform: translateY(-100%);
            opacity: 0;
        }

        .open .bottom-shape {
            transform: translateY(100%);
            opacity: 0;
        }

        .open .center-btn {
            opacity: 0;
        }

        /* ================= CONTENT ================= */
        .content {
            opacity: 0;
            transition: 2s;
        }

        .open .content {
            opacity: 1;
        }

        /* ================= HERO ================= */
        .page {
            background: url("2.jpg") center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #b89b5e;
        }

        /* ================= COUNTDOWN SECTION ================= */
        .countdown-section {
            background: #66021f;
            padding: 80px 0;
            position: relative;
        }

        /* WHITE PAPER */
        .countdown-inner {
            background: #f5f2ee;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .mirage-icon {
            width: 160px;
            max-width: 60vw;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* MASK IMAGES */
        .mask-top,
        .mask-bottom {
            width: 100%;
            display: block;
            position: relative;
            z-index: 3;
        }

        .mask-top {
            margin-bottom: -50px;
        }

        .mask-bottom {
            transform: rotate(180deg);
            margin-top: -50px;
        }

        /* TEXT STYLE */
        .count-title {
            font-family: 'kurdish', sans-serif;
            font-style: italic;
            font-size: 40px;
            color: #777;
            margin-bottom: 20px;
        }

        /* COUNTDOWN */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-family: 'Playfair Display';
            font-size: 2rem;
        }

        .countdown-item span {
            font-weight: 600;
        }

        /* ================= LOCATION ================= */
        .location-card {
            max-width: 900px;
            margin: 40px auto;
            position: relative;
        }

        .bg-image {
            width: 100%;
        }

        .overlay-text {
            position: absolute;
            top: 0%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #333;
            font-family: 'kurdishfont', sans-serif;
        }

        .divider {
            width: 180px;
            height: 2px;
            margin: 15px auto;
            background: linear-gradient(to right, transparent, #b89b5e, transparent);
            position: relative;
            animation: glowLine 2s infinite alternate;
        }

        @keyframes glowLine {
            from {
                opacity: 0.6;
            }

            to {
                opacity: 1;
            }
        }

        /* Optional decorative center dot */
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #b89b5e;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* ================= MOBILE ================= */
        @media(max-width:600px) {
            #countdown {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* SCROLL INDICATOR */
        .scroll-indicator {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(0, 0, 0, 0.8);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-line {
            height: 40px;
            width: 2px;
            background: rgba(255, 255, 255, 0.3);
            overflow: hidden;
            border-radius: 10px;
            position: relative;
        }

        .scroll-dot {
            width: 100%;
            height: 12px;
            background: black;
            animation: scrollAnim 1.5s infinite ease-in-out;
        }

        /* ANIMATION */
        @keyframes scrollAnim {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(40px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            padding: 12px 16px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .music-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>
    <audio id="bg-music" src="music.mp3" preload="auto" loop></audio>
    <div class="first-view">
        <img class="shape left-shape"
            src="https://static.tildacdn.net/tild6338-3733-4431-a363-306634383864/Polygon_4.png">
        <img class="shape right-shape"
            src="https://static.tildacdn.net/tild3636-6566-4132-b665-343766326335/Polygon_3.png">
        <img class="shape top-shape"
            src="https://static.tildacdn.net/tild3762-3738-4361-b134-333538333135/Polygon_1_3.png">
        <img class="shape bottom-shape"
            src="https://static.tildacdn.net/tild6262-6339-4933-b833-343039643037/Polygon_2_1.png">

        <div class="center-btn" onclick="openInvite()">
            <h3>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</h3>
            <img src="https://static.tildacdn.net/tild3435-3731-4464-a537-636664626563/ChatGPT_Image_Aug_3_.png">
            <div class="divider"></div>
            <p style="font-family: 'kurdishfont', sans-serif; color: rgb(82, 82, 82); position: absolute;">بانگهێشتنامەی مارەکردن</p>
        </div>
    </div>

    <div class="content">
        <button id="music-btn" class="music-btn" onclick="toggleMusic()">◼</button>
        <!-- HERO -->
        <div class="page">
            <img src="ring.webp" class="mirage-icon" />
            <h1>Ahmed & Selar</h1>
            <p>بەخۆشحاڵیەوە بانگهێشتتان دەکەین بۆ ئاهەنگی مارەکردنەکەمان</p>

            <!-- SCROLL INDICATOR -->
            <div class="scroll-indicator">
                <span>Scroll</span>
                <div class="scroll-line">
                    <div class="scroll-dot"></div>
                </div>
            </div>
        </div>

        <!-- COUNTDOWN -->
        <div class="countdown-section">

            <!-- TOP TORN MASK -->
            <img class="mask-top"
                src="https://static.tildacdn.net/tild3832-6561-4131-b539-313934396635/Mask_group_2_1_Trace.svg">

            <!-- WHITE CONTENT -->
            <div class="countdown-inner">
                <p class="count-title">ئاهەنگەکە دەستپێدەکات لە</p>

                <div id="countdown">
                    <div class="countdown-item"><span id="days">0</span><br>Days</div>
                    <div class="countdown-item"><span id="hours">0</span><br>Hours</div>
                    <div class="countdown-item"><span id="minutes">0</span><br>Minutes</div>
                    <div class="countdown-item"><span id="seconds">0</span><br>Seconds</div>
                </div>
            </div>

            <!-- BOTTOM TORN MASK -->
            <img class="mask-bottom"
                src="https://static.tildacdn.net/tild3832-6561-4131-b539-313934396635/Mask_group_2_1_Trace.svg">

        </div>

        <!-- LOCATION -->
        <div class="location-card">
            <img src="1.webp" class="bg-image">
            <div class="overlay-text">
                <h2>ناونیشان</h2>
                <p>٥ حەسارۆک</p>
            </div>
        </div>
    </div>

    <script>
        function openInvite() {
            document.body.classList.add("open");

            const music = document.getElementById("bg-music");
            music.volume = 0;
            music.play();

            let vol = 0;
            const fade = setInterval(() => {
                if (vol < 1) {
                    vol += 0.05;
                    music.volume = vol;
                } else {
                    clearInterval(fade);
                }
            }, 200);
        }

        const weddingDate = new Date("June 15, 2026 19:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        const music = document.getElementById("bg-music");
        const btn = document.getElementById("music-btn");

        function toggleMusic() {
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏹"; // pause icon
            } else {
                music.pause();
                btn.innerHTML = "▶"; // play icon
            }
        }
    </script>

</body>

</html>
