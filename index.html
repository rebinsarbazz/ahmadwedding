<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* ================= FIRST VIEW ================= */
.first-view {
    position: fixed;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    z-index: 10;
}
h1 {
    font-family: 'Playfair Display', serif;
}

.shape {
    position: absolute;
    transition: all 1.5s ease;
    width: 50%;
}

.left-shape { top:15%; left:0; }
.right-shape { top:15%; right:0; }
.top-shape { top:15%; left:0; width:100%; }
.bottom-shape { bottom:25%; left:0; width:100%; }

.center-btn {
    position: absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

.center-btn img {
    width:120px;
}

/* OPEN ANIMATION */
.open .left-shape { transform:translateX(-100%); opacity:0; }
.open .right-shape { transform:translateX(100%); opacity:0; }
.open .top-shape { transform:translateY(-100%); opacity:0; }
.open .bottom-shape { transform:translateY(100%); opacity:0; }
.open .center-btn { opacity:0; }

/* ================= CONTENT ================= */
.content {
    opacity:0;
    transition:2s;
}

.open .content {
    opacity:1;
}

/* ================= HERO ================= */
.page {
    background:url("2.jpg") center/cover;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#b89b5e;
}

/* ================= COUNTDOWN SECTION ================= */
.countdown-section {
    background:#66021f; /* 🔥 RED BACKGROUND */
    padding:80px 0;
    position:relative;
}

/* WHITE PAPER */
.countdown-inner {
    background:#f5f2ee;
    padding:60px 20px;
    text-align:center;
    position:relative;
    z-index:2;
}

.mirage-icon {
            width: 160px;
            max-width: 60vw;
            margin: 25px 0;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s ease;
            filter: drop-shadow(0 0 15px rgba(184, 155, 94, 0.5));
        }

         .open .mirage-icon {
            opacity: 1;
            transform: scale(1);
            animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite;
        }

/* MASK IMAGES */
.mask-top,
.mask-bottom {
    width:100%;
    display:block;
    position:relative;
    z-index:3;
}

.mask-top { margin-bottom:-50px; }

.mask-bottom {
    transform:rotate(180deg);
    margin-top:-50px;
}

/* TEXT STYLE */
.count-title {
    font-family:'Playfair Display', serif;
    font-style:italic;
    color:#777;
    margin-bottom:20px;
}

/* COUNTDOWN */
#countdown {
    display:flex;
    justify-content:center;
    gap:25px;
    font-family:'Playfair Display';
    font-size:2rem;
}

.countdown-item span {
    font-weight:600;
}

/* ================= LOCATION ================= */
.location-card {
    max-width:900px;
    margin:40px auto;
    position:relative;
}

.bg-image {
    width:100%;
}

.overlay-text {
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    color:#333;
}

/* ================= MOBILE ================= */
@media(max-width:600px){
    #countdown {
        flex-direction:column;
        gap:10px;
    }
}
</style>
</head>

<body>

<div class="first-view">
    <img class="shape left-shape" src="https://static.tildacdn.net/tild6338-3733-4431-a363-306634383864/Polygon_4.png">
    <img class="shape right-shape" src="https://static.tildacdn.net/tild3636-6566-4132-b665-343766326335/Polygon_3.png">
    <img class="shape top-shape" src="https://static.tildacdn.net/tild3762-3738-4361-b134-333538333135/Polygon_1_3.png">
    <img class="shape bottom-shape" src="https://static.tildacdn.net/tild6262-6339-4933-b833-343039643037/Polygon_2_1.png">

    <div class="center-btn" onclick="openInvite()">
        <h2>Touch to Open</h2>
        <img src="https://static.tildacdn.net/tild3435-3731-4464-a537-636664626563/ChatGPT_Image_Aug_3_.png">
    </div>
</div>

<div class="content">

    <!-- HERO -->
    <div class="page">
        <img src="png-Photoroom.png" class="mirage-icon">
        <h1>Ahmed & Sara</h1>
        <p>We invite you to celebrate our wedding</p>
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown-section">

        <!-- TOP TORN MASK -->
        <img class="mask-top" src="https://static.tildacdn.net/tild3832-6561-4131-b539-313934396635/Mask_group_2_1_Trace.svg">

        <!-- WHITE CONTENT -->
        <div class="countdown-inner">
            <p class="count-title">The Celebration Begins In</p>

            <div id="countdown">
                <div class="countdown-item"><span id="days">0</span><br>Days</div>
                <div class="countdown-item"><span id="hours">0</span><br>Hours</div>
                <div class="countdown-item"><span id="minutes">0</span><br>Minutes</div>
                <div class="countdown-item"><span id="seconds">0</span><br>Seconds</div>
            </div>
        </div>

        <!-- BOTTOM TORN MASK -->
        <img class="mask-bottom" src="https://static.tildacdn.net/tild3832-6561-4131-b539-313934396635/Mask_group_2_1_Trace.svg">

    </div>

    <!-- LOCATION -->
    <div class="location-card">
        <img src="1.webp" class="bg-image">
        <div class="overlay-text">
            <h2>Chateau de Paon</h2>
            <p>France</p>
        </div>
    </div>

</div>

<script>
function openInvite(){
    document.body.classList.add("open");
}

const weddingDate = new Date("June 15, 2026 19:00:00").getTime();

function updateCountdown(){
    const now = new Date().getTime();
    const distance = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(distance/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerText = Math.floor((distance%(1000*60*60))/(1000*60));
    document.getElementById("seconds").innerText = Math.floor((distance%(1000*60))/1000);
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
