<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Open Graph (Facebook, WhatsApp, etc.) -->
    <meta property="og:title" content="Wedding Invitation - Ahmed & Selar">
    <meta property="og:description" content="Join us for our special wedding celebration 💍">
    <meta property="og:image" content="https://ahmadwedding.vercel.app/logo.png">
    <meta property="og:url" content="https://ahmadwedding.vercel.app">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wedding Invitation - Ahmed & Selar">
    <meta name="twitter:description" content="Join us for our special wedding celebration 💍">
    <meta name="twitter:image" content="https://ahmadwedding.vercel.app/logo.png">
    <title>Wedding Invitation</title>

    <style>
        @font-face {
            font-family: 'Kurdishfont';
            src: url('myfont.woff') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Kurdish';
            src: url('NizarAldhabi.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* ================= FIRST VIEW ================= */
        .first-view {
             position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1000;
            background: #fffaf3;
            top: 0;
            left: 0;
            transition: opacity 0.8s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
        }

        p {
            font-family: 'kurdishfont', sans-serif;
        }

        h3 {
            font-family: 'Amiri', serif;
            font-size: 22px;
            direction: rtl;
        }

        .shape {
            position: absolute;
            transition: all 4.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            width: 100%;
            pointer-events: none;
        }

        .left-shape {
            top: 5%;
            left: -60%;
            width: 115%;
        }

        .right-shape {
            top: 4%;
            right: -60%;
            width: 115%;
        }

        .top-shape {
            left: -65%;
            width: 230%;
        }

        .bottom-shape {
            bottom: 0%;
            left: -50%;
            width: 200%;
        }

        .center-btn {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            cursor: pointer;
            transition: opacity 0.5s;
            z-index: 100;
        }

        .center-btn img {
            width: 120px;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s;
        }

        .center-btn img:hover {
            transform: scale(1.02);
        }

        /* OPEN ANIMATION */
        body.open .first-view {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        body.open .left-shape {
            transform: translateX(-120%);
            opacity: 0;
        }

        body.open .right-shape {
            transform: translateX(120%);
            opacity: 0;
        }

        body.open .top-shape {
            transform: translateY(-120%);
            opacity: 0;
        }

        body.open .bottom-shape {
            transform: translateY(120%);
            opacity: 0;
        }

        body.open .center-btn {
            opacity: 0;
            pointer-events: none;
        }

        /* ================= CONTENT ================= */
        .content {
            opacity: 0;
            transition: 2s;
        }

        .open .content {
            opacity: 1;
        }

        /* ================= HERO ================= */
        .page {
            background: url("2.jpg") center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #b89b5e;
        }

        /* ================= COUNTDOWN SECTION ================= */
        .countdown-section {
            background: #66021f;
            padding: 80px 0;
            position: relative;
        }

        /* WHITE PAPER */
        .countdown-inner {
            background: #f5f2ee;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .mirage-icon {
            width: 160px;
            max-width: 60vw;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* MASK IMAGES */
        .mask-top,
        .mask-bottom {
            width: 100%;
            display: block;
            position: relative;
            z-index: 3;
        }

        .mask-top {
            margin-bottom: -50px;
        }

        .mask-bottom {
            transform: rotate(180deg);
            margin-top: -50px;
        }

        /* TEXT STYLE */
        .count-title {
            font-family: 'kurdish', sans-serif;
            font-style: italic;
            font-size: 40px;
            color: #777;
            margin-bottom: 20px;
        }

        /* COUNTDOWN */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-family: 'Playfair Display';
            font-size: 2rem;
        }

        .countdown-item span {
            font-weight: 600;
        }

        /* ================= LOCATION ================= */
        .location-card {
            max-width: 900px;
            margin: 40px auto;
            position: relative;
        }

        .bg-image {
            width: 100%;
        }

        .overlay-text {
            position: absolute;
            top: 0%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #333;
            font-family: 'kurdishfont', sans-serif;
        }

        .divider {
            width: 180px;
            height: 2px;
            margin: 15px auto;
            background: linear-gradient(to right, transparent, #b89b5e, transparent);
            position: relative;
            animation: glowLine 2s infinite alternate;
        }

        @keyframes glowLine {
            from {
                opacity: 0.6;
            }

            to {
                opacity: 1;
            }
        }

        /* Optional decorative center dot */
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #b89b5e;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* ================= MOBILE ================= */
        @media(max-width:600px) {
            #countdown {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* SCROLL INDICATOR */
        .scroll-indicator {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(0, 0, 0, 0.8);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-line {
            height: 40px;
            width: 2px;
            background: rgba(255, 255, 255, 0.3);
            overflow: hidden;
            border-radius: 10px;
            position: relative;
        }

        .scroll-dot {
            width: 100%;
            height: 12px;
            background: black;
            animation: scrollAnim 1.5s infinite ease-in-out;
        }

        /* ANIMATION */
        @keyframes scrollAnim {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(40px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            padding: 12px 16px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .music-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .map-container {
            max-width: 1000px;
            margin: 20px auto 0;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            background: #fff;
            border: 2px solid #e9d5b5;
        }

        .map-container iframe {
            width: 100%;
            height: 450px;
            display: block;
            border: none;
            filter: brightness(1.02) contrast(1.02);
        }

        .map-action {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .map-btn {
            background: #b89b5e;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-family: 'Kurdishfont', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-decoration: none;
        }

        .map-btn:hover {
            background: #8e7848;
            transform: translateY(-3px);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
        }

        .map-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <audio id="bg-music" src="music.mp3" preload="auto" loop></audio>
    <!-- FIRST VIEW (COVER) -->
    <div class="first-view">
        <img class="shape left-shape"
            src="https://static.tildacdn.net/tild6338-3733-4431-a363-306634383864/Polygon_4.png" alt="decor">
        <img class="shape right-shape"
            src="https://static.tildacdn.net/tild3636-6566-4132-b665-343766326335/Polygon_3.png" alt="decor">
        <img class="shape top-shape"
            src="https://static.tildacdn.net/tild3762-3738-4361-b134-333538333135/Polygon_1_3.png" alt="decor">
        <img class="shape bottom-shape"
            src="https://static.tildacdn.net/tild6262-6339-4933-b833-343039643037/Polygon_2_1.png" alt="decor">

        <div class="center-btn" onclick="openInvite()">
            <h3>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</h3>
            <img src="https://static.tildacdn.net/tild3435-3731-4464-a537-636664626563/ChatGPT_Image_Aug_3_.png"
                alt="invitation icon">
            <div class="divider"></div>
            <p style="font-family: 'kurdishfont', sans-serif; color: rgb(82, 82, 82); position: absolute; left: 10%;">بانگهێشتنامەی مارەکردن</p>
        </div>
    </div>

    <div class="content">
        <button id="music-btn" class="music-btn" onclick="toggleMusic()">◼</button>
        <!-- HERO -->
        <div class="page">
            <img src="ring.webp" class="mirage-icon" />
            <h1>Ahmed & Selar</h1>
            <p>بەخۆشحاڵیەوە بانگهێشتتان دەکەین بۆ ئاهەنگی مارەکردنەکەمان</p>

            <!-- SCROLL INDICATOR -->
            <div class="scroll-indicator">
                <span>Scroll</span>
                <div class="scroll-line">
                    <div class="scroll-dot"></div>
                </div>
            </div>
        </div>

        <!-- COUNTDOWN -->
        <div class="countdown-section">

            <!-- TOP TORN MASK -->
            <img class="mask-top"
                src="https://static.tildacdn.net/tild3832-6561-4131-b539-313934396635/Mask_group_2_1_Trace.svg">

            <!-- WHITE CONTENT -->
            <div class="countdown-inner">
                <p class="count-title">ئاهەنگەکە دەستپێدەکات لە</p>

                <div id="countdown">
                    <div class="countdown-item"><span id="days">0</span><br>Days</div>
                    <div class="countdown-item"><span id="hours">0</span><br>Hours</div>
                    <div class="countdown-item"><span id="minutes">0</span><br>Minutes</div>
                    <div class="countdown-item"><span id="seconds">0</span><br>Seconds</div>
                </div>
            </div>

            <!-- BOTTOM TORN MASK -->
            <img class="mask-bottom"
                src="https://static.tildacdn.net/tild3832-6561-4131-b539-313934396635/Mask_group_2_1_Trace.svg">

        </div>

        <!-- LOCATION -->
        <div class="location-card">
            <img src="1.webp" class="bg-image">
            <div class="overlay-text">
                <p style="color: #b89b5e;">ڕۆشنبیری</p>
                <div class="divider" style="margin-top: 35px;"></div>
            <p style="font-family: 'Kurdishfont', sans-serif; color: #7b5a3b; margin-top: 12px;">
                ڕێکەوت: 17/4/2026 | کاتژمێر 8:30 شەو
            </p>
            </div>
        </div>

         <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m13!1m8!1m3!1d3222.4825205380107!2d44.042728!3d36.130463!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMzbCsDA3JzQ5LjciTiA0NMKwMDInMzMuOCJF!5e0!3m2!1sen!2siq!4v1776103949759!5m2!1sen!2siq" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade"
                title="Wedding Venue Map - Roshnbiry Erbil">
            </iframe>
        </div>

        <!-- EXTRA ACTION BUTTONS FOR NAVIGATION -->
        <div class="map-action">
            <a href="https://www.google.com/maps/dir/?api=1&destination=36.130463,44.042728" target="_blank"
                class="map-btn" rel="noopener noreferrer" style="font-family: 'kurdishfont', sans-serif;">
                📍 دەستنیشانکردنی ڕێگە
            </a>
            <button class="map-btn" id="openMapsAppBtn">
                🗺 کردنەوە لە مۆبایلدا | Open in Maps
            </button>
        </div>
    </div>

    <script>
        // OPEN INVITATION FUNCTION (with music fade-in)
        function openInvite() {
            // prevent double opening
            if (document.body.classList.contains("open")) return;
            document.body.classList.add("open");

            const music = document.getElementById("bg-music");
            if (music) {
                // start at very low volume then fade in
                music.volume = 0;
                music.play().catch(e => console.log("Audio play blocked until user interaction, but gesture exists."));
                let vol = 0;
                const fade = setInterval(() => {
                    if (vol < 1) {
                        vol += 0.05;
                        music.volume = Math.min(vol, 1);
                    } else {
                        clearInterval(fade);
                    }
                }, 200);
            }
        }

        // Countdown logic: wedding date: April 17, 2026 20:30:00
        const weddingDate = new Date("April 17, 2026 20:30:00 GMT+0300").getTime(); // using GMT+3 (Iraq time)

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "0";
                document.getElementById("hours").innerText = "0";
                document.getElementById("minutes").innerText = "0";
                document.getElementById("seconds").innerText = "0";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // MUSIC TOGGLE
        const musicEl = document.getElementById("bg-music");
        const musicBtn = document.getElementById("music-btn");

        window.toggleMusic = function() {
            if (!musicEl) return;
            if (musicEl.paused) {
                musicEl.play().catch(e => console.log("playback error", e));
                musicBtn.innerHTML = "◼";
            } else {
                musicEl.pause();
                musicBtn.innerHTML = "▶";
            }
        };

        // NATIVE MAPS FUNCTIONALITY (uses the new coordinates 36.130463, 44.042728 from updated map)
        function openNativeMap() {
            const lat = 36.130463;
            const lng = 44.042728;
            const label = "Ahmed & Selar Wedding - Roshnbiry, Erbil";
            
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            let mapUrl = "";
            
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                // iOS Apple Maps
                mapUrl = `maps://maps.apple.com/?ll=${lat},${lng}&q=${encodeURIComponent(label)}`;
            } else if (/android/i.test(userAgent)) {
                // Android: Google Maps intent for directions
                mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place=${encodeURIComponent(label)}`;
            } else {
                // Desktop fallback: Google Maps directions
                mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place=${encodeURIComponent(label)}`;
            }
            
            window.open(mapUrl, '_blank');
        }

        // EVENT LISTENERS FOR BUTTONS
        const openBtn = document.getElementById("openInviteBtn");
        if (openBtn) {
            openBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                openInvite();
            });
        }

        const nativeMapBtn = document.getElementById("openMapsAppBtn");
        if (nativeMapBtn) {
            nativeMapBtn.addEventListener("click", openNativeMap);
        }

        // Ensure background music initial load / user gesture handling: 
        // Some browsers block autoplay, but we attach a one-time touchstart to prepare audio.
        // However, the actual play happens after openInvite (user clicks explicitly).
        // Preload audio to make it smoother.
        if (musicEl) {
            musicEl.load();
            // small trick: on first user tap anywhere before opening, we do nothing, but openInvite handles play.
        }

        // fix for any missing background image fallback if 2.jpg not exist, but we keep as is
        // Also ensure that .content becomes visible only after opening
        // No double scroll issues.
        
        // extra smoothing for the map container to be responsive
        window.addEventListener('resize', () => {
            const mapFrame = document.querySelector('.map-container iframe');
            if (mapFrame) {
                // maintain aspect ratio, already set via CSS height auto? but we use height:450px; on desktop, but it's fluid
                // no additional needed.
            }
        });
        
        // Force repaint for the countdown initial digits
        setTimeout(() => {
            updateCountdown();
        }, 100);
        
        // Make the "Scroll" indicator clickable? not needed, but adds friendly ux
        // also for users that might have issues with the first-view transform, ensure body bg.
        document.body.style.background = "#fffaf3";
        
        // if user hasn't opened invite, but maybe they reload - first view stays visible. That's correct.
        // Preload the hidden content images: ring.webp, 1.webp, 2.jpg are preloaded by browser naturally.
        
        // Additional check: update map directions button anchor to match new coordinates (already updated in href)
        const dirLink = document.querySelector('.map-action a');
        if (dirLink) {
            dirLink.setAttribute('href', 'https://www.google.com/maps/dir/?api=1&destination=36.130463,44.042728');
        }
        
        console.log("Wedding invitation ready — map iframe updated as requested.");
    </script>
</body>

</html>
